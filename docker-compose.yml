version: '3.8'

services:
  db:
    image: postgres:15
    environment:
      POSTGRES_DB: study_genius_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    command: >
      sh -c "python manage.py migrate &&
             python manage.py collectstatic --noinput &&
             gunicorn config.wsgi:application --bind 0.0.0.0:8000"
    volumes:
      - ./backend:/app
      - static_volume:/app/static
      - media_volume:/app/media
    environment:
      - SECRET_KEY=django-insecure-docker-key
      - DEBUG=False
      - DB_HOST=db
      - DB_NAME=study_genius_db
      - DB_USER=postgres
      - DB_PASSWORD=postgres
      - GROQ_API_KEY=${GROQ_API_KEY}
    depends_on:
      - db
      - redis
    ports:
      - "8000:8000"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3000:80"
    depends_on:
      - backend

  celery:
    build:
      context: ./backend
      dockerfile: Dockerfile
    command: celery -A config worker -l info
    volumes:
      - ./backend:/app
    environment:
      - SECRET_KEY=django-insecure-docker-key
      - DB_HOST=db
      - GROQ_API_KEY=${GROQ_API_KEY}
    depends_on:
      - db
      - redis

volumes:
  postgres_data:
  static_volume:
  media_volume:
